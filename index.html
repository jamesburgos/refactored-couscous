<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber Ride Dashboard</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    background: transparent;
    color: #000;
  }

  .card {
    padding: 15px;
    border-radius: 12px;
    background: transparent;
    margin-bottom: 15px;
  }

  h2 { margin-top: 0; }

  .verdict {
    font-weight: bold;
    font-size: 1.2em;
  }

  button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    font-size: 1em;
    cursor: pointer;
    background-color: #007aff;
    color: white;
  }

  @media (prefers-color-scheme: dark) {
    body { color: #fff; }
    button { background-color: #0a84ff; }
  }
</style>
</head>
<body>

<div class="card">
  <h2>Fare</h2>
  <p>$0.00</p>
</div>

<div class="card">
  <h2>Distance</h2>
  <p>0.0 mi</p>
</div>

<div class="card">
  <h2>Per Mile Rate</h2>
  <p>$0.00/mi</p>
</div>

<div class="card">
  <h2>Pickup / Dropoff</h2>
  <p>Unknown → Unknown</p>
</div>

<div class="card verdict">
  👎 Skip Ride
</div>

<button onclick="window.close()">Close</button>

</body>
</html>
